<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>新井ファーム 入場受付</title>
  <style>
    /* ===== 全体のスタイル ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: linear-gradient(160deg, #EBF6FD 0%, #D0E8F5 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 40px;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 0 0 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(74, 144, 190, 0.18), 0 2px 8px rgba(74, 144, 190, 0.10);
      overflow: hidden;
    }

    /* ===== ヘッダー ===== */
    .header {
      background: linear-gradient(160deg, #EAF5FC 0%, #CCE8F5 100%);
      padding: 36px 24px 28px;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    /* 豚のイラスト（透かし） */
    .pig-img {
      position: absolute;
      right: -10px;
      top: -15px;
      width: 200px;
      height: auto;
      opacity: 0.28;
      pointer-events: none;
      object-fit: contain;
    }

    .header .farm-icon {
      font-size: 36px;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1B4A6B;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .header p {
      font-size: 14px;
      color: #5A8AAA;
      position: relative;
      z-index: 1;
    }

    /* フォーム内のパディング */
    #form-screen {
      padding: 28px 20px 0;
    }

    /* ===== 各入力項目 ===== */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1B4A6B;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .field label .required {
      color: #e05555;
      margin-left: 4px;
    }

    /* テキスト入力 */
    .field input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #BDD8EC;
      border-radius: 12px;
      font-size: 16px;
      color: #222;
      background: #F0F8FF;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .field input[type="text"]:focus {
      outline: none;
      border-color: #4A90BE;
      background: white;
      box-shadow: 0 0 0 3px rgba(74, 144, 190, 0.15);
    }

    /* 自動記録の表示欄（読み取り専用） */
    .auto-field {
      background: #F0F8FF;
      border: 1.5px solid #BDD8EC;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 自動記録だが編集可能な入力欄 */
    .auto-editable-input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #BDD8EC;
      border-radius: 12px;
      font-size: 16px;
      color: #333;
      background: #F0F8FF;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .auto-editable-input:focus {
      outline: none;
      border-color: #4A90BE;
      background: white;
      box-shadow: 0 0 0 3px rgba(74, 144, 190, 0.15);
    }

    /* 編集ヒントテキスト */
    .field-hint {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }

    /* 訪問理由のボタン */
    .reason-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .reason-btn {
      padding: 14px 8px;
      border: 1.5px solid #BDD8EC;
      border-radius: 12px;
      background: #F0F8FF;
      font-size: 15px;
      color: #1B4A6B;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .reason-btn:active {
      transform: scale(0.97);
    }

    .reason-btn.selected {
      background: linear-gradient(135deg, #5BA8D4, #3A80AF);
      border-color: #3A80AF;
      color: white;
      font-weight: 600;
      box-shadow: 0 2px 8px rgba(58, 128, 175, 0.35);
    }

    /* ===== ドラムスクロール式退場時刻ピッカー ===== */
    .drum-picker-wrapper {
      border: 1.5px solid #BDD8EC;
      border-radius: 12px;
      overflow: hidden;
      background: #F0F8FF;
    }

    .drum-picker-container {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 180px;
      overflow: hidden;
      background: #F0F8FF;
    }

    /* 上下のフェード */
    .drum-picker-container::before,
    .drum-picker-container::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 66px;
      z-index: 2;
      pointer-events: none;
    }

    .drum-picker-container::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(240,248,255,0.95), rgba(240,248,255,0));
    }

    .drum-picker-container::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(240,248,255,0.95), rgba(240,248,255,0));
    }

    /* 選択中アイテムの枠線 */
    .drum-selection-bar {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      height: 48px;
      border-top: 2px solid #4A90BE;
      border-bottom: 2px solid #4A90BE;
      border-radius: 4px;
      z-index: 1;
      pointer-events: none;
    }

    .drum-columns {
      display: flex;
      align-items: center;
      z-index: 3;
    }

    .drum-column {
      width: 80px;
      height: 180px;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    .drum-column:active {
      cursor: grabbing;
    }

    .drum-inner {
      /* 上下にパディングを入れることで先頭・末尾アイテムも中央に来るようにする */
      padding-top: 66px;
      padding-bottom: 66px;
    }

    .drum-item {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 500;
      color: #9dbfd8;
      user-select: none;
      -webkit-user-select: none;
    }

    .drum-item.center {
      color: #1B4A6B;
      font-weight: 700;
      font-size: 24px;
    }

    .drum-separator {
      font-size: 24px;
      font-weight: 700;
      color: #1B4A6B;
      padding: 0 4px;
      z-index: 3;
    }

    .drum-selected-display {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #4A90BE;
      font-weight: 600;
      border-top: 1px solid #E4F1F8;
    }

    /* ===== 送信ボタン ===== */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #5BA8D4 0%, #3A80AF 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.03em;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 14px rgba(58, 128, 175, 0.35);
      -webkit-tap-highlight-color: transparent;
    }

    .submit-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .submit-btn:disabled {
      background: #b0c8d8;
      box-shadow: none;
      cursor: default;
    }

    /* ===== 確認画面 ===== */
    #confirm-screen {
      display: none;
      text-align: center;
      padding: 28px 20px 0;
    }

    .confirm-icon {
      font-size: 60px;
      margin-bottom: 16px;
    }

    .confirm-title {
      font-size: 22px;
      font-weight: 700;
      color: #1B4A6B;
      margin-bottom: 8px;
    }

    .confirm-sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .confirm-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      margin-bottom: 24px;
    }

    .confirm-table tr {
      border-bottom: 1px solid #E4F1F8;
    }

    .confirm-table td {
      padding: 11px 8px;
      font-size: 14px;
    }

    .confirm-table td:first-child {
      color: #666;
      font-weight: 600;
      width: 45%;
    }

    .confirm-table td:last-child {
      color: #222;
    }

    .confirm-back-btn {
      display: inline-block;
      padding: 12px 32px;
      border: 1.5px solid #4A90BE;
      border-radius: 12px;
      color: #4A90BE;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: white;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .confirm-back-btn:active {
      background: #F0F8FF;
    }

    /* ===== エラーメッセージ ===== */
    .error-msg {
      font-size: 12px;
      color: #e05555;
      margin-top: 6px;
      display: none;
    }

    .field.has-error input,
    .field.has-error .drum-picker-wrapper {
      border-color: #e05555;
    }

    .field.has-error .error-msg {
      display: block;
    }

    /* ===== 送信中スピナー ===== */
    .sending-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      font-size: 16px;
      color: #4A90BE;
      font-weight: 600;
    }

    .sending-overlay.show {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #BDD8EC;
      border-top-color: #4A90BE;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

  <div class="spinner"></div>
  <span>送信中...</span>

      <h1>新井ファーム</h1>
      <p>入場受付フォーム</p>
    </div>

    <!-- お名前 -->
    <div class="field" id="field-name">
      <label>お名前<span class="required">*</span></label>
      <input type="text" id="input-name" placeholder="例：田中 太郎" autocomplete="name">
      <div class="error-msg">お名前を入力してください</div>
    </div>

    <!-- 会社名・所属 -->
    <div class="field" id="field-company">
      <label>会社名・所属<span class="required">*</span></label>
      <input type="text" id="input-company" placeholder="例：〇〇動物病院、個人の場合は「個人」">
      <div class="error-msg">会社名・所属を入力してください</div>
    </div>

    <!-- 訪問理由 -->
    <div class="field" id="field-reason">
      <label>訪問理由<span class="required">*</span></label>
      <div class="reason-buttons">
        <button class="reason-btn" data-value="巡回診療">🩺 巡回診療</button>
        <button class="reason-btn" data-value="面談・打合せ">💬 面談・打合せ</button>
        <button class="reason-btn" data-value="配達・納品">📦 配達・納品</button>
        <button class="reason-btn" data-value="検査・採血">🔬 検査・採血</button>
        <button class="reason-btn" data-value="作業・施工">🔧 作業・施工</button>
        <button class="reason-btn" data-value="その他">📝 その他</button>
      </div>
      <div class="error-msg">訪問理由を選択してください</div>
    </div>

    <!-- 入場日（自動記録・修正可） -->
    <div class="field">
      <label>入場日
        <span class="auto-badge" style="margin-left:8px;font-size:11px;background:#4A90BE;color:white;padding:2px 7px;border-radius:20px;">自動記録</span>
        <span style="margin-left:4px;font-size:11px;color:#888;">修正可</span>
      </label>
      <input type="text" id="display-date" class="auto-editable-input" placeholder="YYYY/MM/DD">
      <div class="field-hint">✏️ 日付が違う場合は直接入力して修正できます（例：2026/04/22）</div>
    </div>

    <!-- 入場時刻（自動記録・修正可） -->
    <div class="field">
      <label>入場時刻
        <span class="auto-badge" style="margin-left:8px;font-size:11px;background:#4A90BE;color:white;padding:2px 7px;border-radius:20px;">自動記録</span>
        <span style="margin-left:4px;font-size:11px;color:#888;">修正可</span>
      </label>
      <input type="text" id="display-time" class="auto-editable-input" placeholder="HH:MM">
      <div class="field-hint">✏️ 時刻が違う場合は直接入力して修正できます（例：09:30）</div>
    </div>

    <!-- 退場予定時刻（ドラムスクロール） -->
    <div class="field" id="field-exit">
      <label>退場予定時刻<span class="required">*</span></label>
      <div class="drum-picker-wrapper">
        <div class="drum-picker-container">
          <div class="drum-selection-bar"></div>
          <div class="drum-columns">
            <!-- 時間列 -->
            <div class="drum-column" id="drum-hour">
              <div class="drum-inner" id="drum-hour-inner"></div>
            </div>
            <div class="drum-separator">:</div>
            <!-- 分列 -->
            <div class="drum-column" id="drum-minute">
              <div class="drum-inner" id="drum-minute-inner"></div>
            </div>
          </div>
        </div>
        <div class="drum-selected-display" id="drum-display">退場予定時刻を選択してください</div>
      </div>
      <div class="error-msg">退場予定時刻を選択してください</div>
    </div>

    <!-- 送信ボタン -->
    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">送信する</button>
  </div>

  <!-- ===== 確認画面 ===== -->
  <div id="confirm-screen">
    <div class="confirm-icon">✅</div>
    <div class="confirm-title">送信が完了しました</div>
    <div class="confirm-sub">
      入場記録が登録されました。<br>
      農場内でのご安全をお祈りします。
    </div>
    <table class="confirm-table" id="confirm-table"></table>
    <button class="confirm-back-btn" onclick="resetForm()">別の方の受付はこちら</button>
  </div>

</div>

<script>
  // ===== GASのURL =====
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3MEQvmL1il_FsfpJvAautU69DA6T2wk1Iwyzc5EzciMti8sp6n8qz8S_O8ZMvaqtG/exec';

  // ===== 入場日時の自動記録（修正可） =====
  let entryDate = '';
  let entryTime = '';
  // ユーザーが手動で編集したかどうかのフラグ
  let entryDateModified = false;
  let entryTimeModified = false;

  function updateEntryDateTime() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const h = String(now.getHours()).padStart(2, '0');
    const min = String(now.getMinutes()).padStart(2, '0');

    // 手動編集されていない場合だけ自動更新する
    if (!entryDateModified) {
      entryDate = `${y}/${m}/${d}`;
      document.getElementById('display-date').value = entryDate;
    }
    if (!entryTimeModified) {
      entryTime = `${h}:${min}`;
      document.getElementById('display-time').value = entryTime;
    }
  }

  updateEntryDateTime();
  setInterval(updateEntryDateTime, 60000);

  // 手動編集を検知してフラグを立てる
  document.getElementById('display-date').addEventListener('input', () => {
    entryDateModified = true;
  });
  document.getElementById('display-time').addEventListener('input', () => {
    entryTimeModified = true;
  });

  // ===== 訪問理由のボタン選択 =====
  let selectedReason = '';

  document.querySelectorAll('.reason-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedReason = btn.dataset.value;
      document.getElementById('field-reason').classList.remove('has-error');
    });
  });

  // ===== ドラムスクロールピッカー =====
  // 時間リスト（6〜20時）※20時以降は使わないので除外
  const hours = [];
  for (let h = 6; h <= 20; h++) {
    hours.push(String(h).padStart(2, '0'));
  }

  // 分リスト
  const minutes = ['00', '15', '30', '45'];

  // 初期値：9時00分（hoursの index 3 = '09'）
  let selectedHourIndex = 3;
  let selectedMinuteIndex = 0;

  const ITEM_HEIGHT = 48; // アイテム1つの高さ（px）

  // ドラムの中身を生成する
  function buildDrum(innerEl, items, selectedIndex) {
    innerEl.innerHTML = '';
    items.forEach((val, i) => {
      const div = document.createElement('div');
      div.className = 'drum-item' + (i === selectedIndex ? ' center' : '');
      div.textContent = val;
      innerEl.appendChild(div);
    });
    setDrumPosition(innerEl, selectedIndex, false);
  }

  // ドラムの位置を設定する
  function setDrumPosition(innerEl, index, animate) {
    if (animate) {
      innerEl.style.transition = 'transform 0.2s ease-out';
    } else {
      innerEl.style.transition = 'none';
    }
    innerEl.style.transform = `translateY(${-index * ITEM_HEIGHT}px)`;
  }

  // 選択中アイテムのスタイルを更新する
  function updateDrumStyle(innerEl, selectedIndex) {
    innerEl.querySelectorAll('.drum-item').forEach((el, i) => {
      el.className = 'drum-item' + (i === selectedIndex ? ' center' : '');
    });
  }

  // 退場時刻の表示を更新する
  function updateExitDisplay() {
    document.getElementById('drum-display').textContent =
      `${hours[selectedHourIndex]}:${minutes[selectedMinuteIndex]}`;
    document.getElementById('field-exit').classList.remove('has-error');
  }

  // タッチ・スクロール操作の設定（なめらかスクロール）
  function setupDrumScroll(columnEl, innerEl, items, getIndex, setIndex) {
    let startY = 0;
    let baseOffset = 0;
    let currentOffset = 0;
    let isDragging = false;

    function clamp(index) {
      return Math.max(0, Math.min(items.length - 1, index));
    }

    // タッチ開始：現在位置を基準に保存
    columnEl.addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
      baseOffset = -getIndex() * ITEM_HEIGHT;
      currentOffset = baseOffset;
      isDragging = true;
      innerEl.style.transition = 'none';
    }, { passive: true });

    // タッチ移動：指の動きに合わせてなめらかに追従する
    // passive: false にしてpreventDefaultを呼ぶことでページのスクロールを止める
    columnEl.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      e.preventDefault(); // ドラム操作中はページをスクロールさせない
      const deltaY = e.touches[0].clientY - startY;
      const minOffset = -(items.length - 1) * ITEM_HEIGHT;
      currentOffset = Math.max(minOffset, Math.min(0, baseOffset + deltaY));
      innerEl.style.transform = `translateY(${currentOffset}px)`;
      // 最も近いアイテムをハイライト
      updateDrumStyle(innerEl, clamp(Math.round(-currentOffset / ITEM_HEIGHT)));
    }, { passive: false });

    // タッチ終了：最も近いアイテムにスナップ
    columnEl.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      const snapped = clamp(Math.round(-currentOffset / ITEM_HEIGHT));
      setIndex(snapped);
      updateDrumStyle(innerEl, snapped);
      setDrumPosition(innerEl, snapped, true);
      updateExitDisplay();
    });

    // マウスホイール操作（PC確認用）
    columnEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      const newIndex = clamp(getIndex() + (e.deltaY > 0 ? 1 : -1));
      setIndex(newIndex);
      updateDrumStyle(innerEl, newIndex);
      setDrumPosition(innerEl, newIndex, true);
      updateExitDisplay();
    }, { passive: false });
  }

  // 時間ドラムの初期化
  const hourInner = document.getElementById('drum-hour-inner');
  buildDrum(hourInner, hours, selectedHourIndex);
  setupDrumScroll(
    document.getElementById('drum-hour'), hourInner, hours,
    () => selectedHourIndex, (i) => { selectedHourIndex = i; }
  );

  // 分ドラムの初期化
  const minuteInner = document.getElementById('drum-minute-inner');
  buildDrum(minuteInner, minutes, selectedMinuteIndex);
  setupDrumScroll(
    document.getElementById('drum-minute'), minuteInner, minutes,
    () => selectedMinuteIndex, (i) => { selectedMinuteIndex = i; }
  );

  updateExitDisplay();

  // ===== バリデーション =====
  function validate() {
    let isValid = true;

    const nameVal = document.getElementById('input-name').value.trim();
    if (!nameVal) {
      document.getElementById('field-name').classList.add('has-error');
      isValid = false;
    } else {
      document.getElementById('field-name').classList.remove('has-error');
    }

    const companyVal = document.getElementById('input-company').value.trim();
    if (!companyVal) {
      document.getElementById('field-company').classList.add('has-error');
      isValid = false;
    } else {
      document.getElementById('field-company').classList.remove('has-error');
    }

    if (!selectedReason) {
      document.getElementById('field-reason').classList.add('has-error');
      isValid = false;
    }

    return isValid;
  }

  // ===== フォーム送信処理 =====
  async function handleSubmit() {
    if (!validate()) {
      document.querySelector('.has-error').scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const now = new Date();
    const submitDatetime = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    const exitTime = `${hours[selectedHourIndex]}:${minutes[selectedMinuteIndex]}`;

    // 送信時に入力欄から最新の日時を取得（手動修正に対応）
    const finalEntryDate = document.getElementById('display-date').value.trim() || entryDate;
    const finalEntryTime = document.getElementById('display-time').value.trim() || entryTime;

    const data = {
      submitDatetime,
      name: document.getElementById('input-name').value.trim(),
      company: document.getElementById('input-company').value.trim(),
      reason: selectedReason,
      entryDate: finalEntryDate,
      entryTime: finalEntryTime,
      exitTime
    };

    document.getElementById('sending-overlay').classList.add('show');
    document.getElementById('submit-btn').disabled = true;

    try {
      // GASの返事を確認し、成功の返事が来たときだけ完了画面を出す（記帳漏れ防止）
      const res = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (!result || result.status !== 'success') {
        throw new Error((result && result.message) || '記録できませんでした');
      }
      showConfirmScreen(data);
    } catch (err) {
      alert('送信に失敗しました。記録はまだ保存されていません。\nネットワーク接続を確認してから再度お試しください。');
      document.getElementById('submit-btn').disabled = false;
    } finally {
      document.getElementById('sending-overlay').classList.remove('show');
    }
  }

  // ===== 確認画面の表示 =====
  function showConfirmScreen(data) {
    const rows = [
      ['お名前', data.name],
      ['会社名・所属', data.company],
      ['訪問理由', data.reason],
      ['入場日', data.entryDate.replace(/^(\d+)\/(\d+)\/(\d+)$/, '$1年$2月$3日')],
      ['入場時刻', data.entryTime],
      ['退場予定時刻', data.exitTime],
    ];
    document.getElementById('confirm-table').innerHTML =
      rows.map(([label, value]) => `<tr><td>${label}</td><td>${value}</td></tr>`).join('');
    document.getElementById('form-screen').style.display = 'none';
    document.getElementById('confirm-screen').style.display = 'block';
    window.scrollTo(0, 0);
  }

  // ===== フォームをリセット =====
  function resetForm() {
    document.getElementById('input-name').value = '';
    document.getElementById('input-company').value = '';
    selectedReason = '';
    document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
    selectedHourIndex = 3; // 9時にリセット
    selectedMinuteIndex = 0;
    buildDrum(hourInner, hours, selectedHourIndex);
    buildDrum(minuteInner, minutes, selectedMinuteIndex);
    updateExitDisplay();
    // 手動編集フラグをリセットして入場日時を現在時刻に戻す
    entryDateModified = false;
    entryTimeModified = false;
    updateEntryDateTime();
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('confirm-screen').style.display = 'none';
    document.getElementById('form-screen').style.display = 'block';
    window.scrollTo(0, 0);
  }
</script>
</body>
</html>
